name: Physical build report
description: Share measured optical, mechanical, and power results from a real build.
title: "Build report: "
labels: ["build report"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for building it. Do not include credentials, exact prescription data, addresses, or other personal information. This is not a safety certification.
  - type: input
    id: commit
    attributes:
      label: Repository commit
      placeholder: Full git commit SHA
    validations:
      required: true
  - type: textarea
    id: parts
    attributes:
      label: Exact parts and CAD parameters
      description: OLED; lens EFL/BFL, diameter, thickness, and both measured face sags; combiner size/ratio; protected cell rating; printer/material; and changed parameters.
    validations:
      required: true
  - type: textarea
    id: optics
    attributes:
      label: Optical and mechanical measurements
      description: Eye box, focus, forward/local-pod/on-glasses/off-body mass, centre of mass, clearance, drift, brightness, ghosting, prescription-lens effects, and comfort.
    validations:
      required: true
  - type: textarea
    id: power
    attributes:
      label: Power measurements
      description: Poll interval, contrast, RSSI, average currents, measured runtime, charge time, and method/instrument.
    validations:
      required: true
  - type: textarea
    id: retention
    attributes:
      label: Hinge, mount, and tether evidence
      description: Record 200-cycle hard-stop/keeper condition, one-hand clear-away time, parked sightline clearance, mount pull result, connector type and directional release forces, cable voltage drop, and body-pod routing.
    validations:
      required: true
  - type: textarea
    id: gait
    attributes:
      label: Controlled gait test, if attempted
      description: State whether all stationary prerequisites passed. For any empty-level-room test, record spotter/hazards, 30-second/2-minute/5-minute stages, cue stability, gait change, drift, tether pull, and every visual/balance symptom. Write "not attempted" when stationary only.
    validations:
      required: true
  - type: textarea
    id: failures
    attributes:
      label: Failures, safety issues, and modifications
      description: Include what did not work; failed results are especially useful.
    validations:
      required: true
  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Safety acknowledgement
      options:
        - label: I tested stationary, charged off-head, and have not presented this report as certification.
          required: true
        - label: I did not intentionally snag-test the device on a person or use it in traffic, on stairs, or in a public route.
          required: true
